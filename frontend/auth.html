<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
  <title>Authentication — VIRELLI</title>
  <style>
    .auth-container { max-width: 450px; margin: var(--spacing-xl) auto; padding: var(--spacing-lg); border: 1px solid var(--grey-light); background: #ffffff; }
    .auth-tabs { display: flex; justify-content: space-around; margin-bottom: 2rem; border-bottom: 1px solid var(--grey-light); }
    .auth-tab { padding: 1rem; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--grey-mid); }
    .auth-tab.active { color: var(--black); font-weight: 500; border-bottom: 2px solid var(--grey-dark); }
    .auth-form { display: none; flex-direction: column; gap: 1.25rem; }
    .auth-form.active { display: flex; }
    .auth-form input { width: 100%; padding: 0.9rem 1rem; border: 1px solid var(--grey-light); background: #fafafa; font-family: var(--font); font-size: 0.85rem; outline: none; }
    .auth-form input:focus { border-color: var(--grey-mid); background: #ffffff; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-left">
      <a href="index.html" class="logo">VIRELLI</a>
    </div>
  </nav>

  <main>
    <div class="auth-container">
      <div class="auth-tabs">
        <span class="auth-tab active" id="tab-signin" onclick="switchAuthTab('signin')">Sign In</span>
        <span class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</span>
      </div>

      <form id="form-signin" class="auth-form active">
        <input type="email" id="signin-email" placeholder="Email Address" required>
        <input type="password" id="signin-password" placeholder="Password" required>
        <button type="submit" class="btn">Sign In</button>
      </form>

      <form id="form-signup" class="auth-form">
        <input type="text" id="signup-name" placeholder="Full Name" required>
        <input type="email" id="signup-email" placeholder="Email Address" required>
        <input type="password" id="signup-password" placeholder="Create Password" required>
        <button type="submit" class="btn">Create Account</button>
      </form>
    </div>
  </main>

  <script src="js/cart.js"></script>
  <script src="js/auth-engine.js"></script>
</body>
</html>
