<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="VIRELLI — Sign in or create an account.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
  <title>Account — VIRELLI</title>
  <style>
    .auth-container {
      max-width: 460px;
      width: 100%;
      margin: var(--spacing-xl) auto 6rem auto;
      padding: var(--spacing-lg);
      border: 1px solid var(--grey-light);
      background: #ffffff;
      box-sizing: border-box;
    }
    .auth-tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--grey-light);
    }
    .auth-tab {
      padding: 1rem;
      cursor: pointer;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--grey-mid);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .auth-tab.active { color: var(--black); font-weight: 500; border-bottom-color: var(--black); }
    .auth-form { display: none; flex-direction: column; gap: 1.25rem; }
    .auth-form.active { display: flex; }
    .auth-form input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid var(--grey-light);
      background: #fafafa;
      font-family: var(--font);
      font-size: 0.85rem;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .auth-form input:focus { border-color: var(--grey-mid); background: #fff; }
    .auth-form .btn { width: 100%; padding: 1rem; font-size: 0.8rem; }
    .auth-link {
      font-size: 0.78rem;
      color: var(--grey-mid);
      text-align: right;
      text-decoration: underline;
      display: block;
    }
    .auth-link:hover { color: var(--black); }
    .auth-divider {
      text-align: center;
      font-size: 0.75rem;
      color: var(--grey-mid);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0.25rem 0;
    }
    .auth-message {
      font-size: 0.82rem;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      display: none;
    }
    .auth-error { background: #fff5f5; border: 1px solid #f5c6cb; color: #c0392b; }
    .auth-success { background: #f0fff4; border: 1px solid #b2dfdb; color: #27ae60; }
    .auth-message:not(:empty) { display: block; }

    @media (max-width: 520px) {
      .auth-container {
        margin: 2rem 1rem 4rem 1rem;
        padding: 1.5rem 1.25rem;
      }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <div class="auth-container">
      <div class="auth-tabs" id="auth-tabs">
        <span class="auth-tab active" id="tab-signin" onclick="switchAuthTab('signin')">Sign In</span>
        <span class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</span>
      </div>

      <div id="auth-error" class="auth-message auth-error"></div>
      <div id="auth-success" class="auth-message auth-success"></div>

      <form id="form-signin" class="auth-form active">
        <div style="display:flex;flex-direction:column;gap:0.3rem;">
          <label for="signin-email" style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--grey-mid);">Email Address</label>
          <input type="email" id="signin-email" placeholder="e.g. joao@email.com" required autocomplete="email">
        </div>
        <div style="display:flex;flex-direction:column;gap:0.3rem;">
          <label for="signin-password" style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--grey-mid);">Password</label>
          <input type="password" id="signin-password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <a class="auth-link" href="forgot-password.html">Forgot your password?</a>
        <button type="submit" class="btn">Sign In</button>
        <div class="auth-divider">or</div>
        <button type="button" class="btn" style="background:#fff;color:var(--black);border:1px solid var(--grey-light);" onclick="switchAuthTab('signup')">Create an Account</button>
      </form>

      <form id="form-signup" class="auth-form">
        <div style="display:flex;flex-direction:column;gap:0.3rem;">
          <label for="signup-name" style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--grey-mid);">Full Name</label>
          <input type="text" id="signup-name" placeholder="e.g. João Silva" required autocomplete="name">
        </div>
        <div style="display:flex;flex-direction:column;gap:0.3rem;">
          <label for="signup-email" style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--grey-mid);">Email Address</label>
          <input type="email" id="signup-email" placeholder="e.g. joao@email.com" required autocomplete="email">
        </div>
        <div style="display:flex;flex-direction:column;gap:0.3rem;">
          <label for="signup-password" style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--grey-mid);">Password</label>
          <input type="password" id="signup-password" placeholder="Minimum 6 characters" required autocomplete="new-password">
        </div>
        <div style="display:flex;flex-direction:column;gap:0.3rem;">
          <label for="signup-password-confirm" style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--grey-mid);">Repeat Password</label>
          <input type="password" id="signup-password-confirm" placeholder="Type your password again" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn">Create Account</button>
        <div class="auth-divider">or</div>
        <button type="button" class="btn" style="background:#fff;color:var(--black);border:1px solid var(--grey-light);" onclick="switchAuthTab('signin')">Sign In Instead</button>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth-engine.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      injectLayout();
      const session = JSON.parse(localStorage.getItem('VIRELLI_SESSION'));
      if (session) window.location.href = session.role === 'admin' ? 'admin.html' : 'user.html';
    });
  </script>
</body>
</html>
