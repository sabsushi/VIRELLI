<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="VIRELLI Catalog — Browse and filter our full collection.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
  <title>Products — VIRELLI</title>
  <style>
    .catalog-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 3.5rem;
      padding: 3rem var(--spacing-lg);
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .filter-section { border-bottom: 1px dashed var(--grey-light); padding: 1.25rem 0; }
    .filter-header {
      width: 100%; background: transparent; border: none;
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font); font-size: 0.85rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; padding: 0;
      color: var(--black);
    }
    .filter-content { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .size-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.4rem; }
    .size-box {
      border: 1px solid var(--grey-light); background: #ffffff;
      padding: 0.6rem 0; font-size: 0.75rem; text-transform: uppercase;
      font-family: var(--font); cursor: pointer; text-align: center; transition: all 0.2s;
    }
    .size-box:hover, .size-box.active { border-color: var(--black); background: #000; color: #fff; }
    
    .filter-label {
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.85rem; color: var(--grey-dark); cursor: pointer;
    }
    .filter-label input[type="checkbox"] { accent-color: var(--black); cursor: pointer; }
    .count-span { color: var(--grey-mid); font-size: 0.8rem; margin-left: auto; }
    .collection-btn-link {
      background: transparent; border: none; font-family: var(--font);
      font-size: 0.85rem; text-align: left; padding: 0;
      color: var(--grey-dark); cursor: pointer; transition: color 0.2s;
    }
    .collection-btn-link:hover, .collection-btn-link.active { color: var(--black); font-weight: 500; }
    
    #catalog-products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 3rem 2rem;
    }
    .catalog-card {
      display: flex; flex-direction: column; background: #ffffff;
    }
    .catalog-card .card-image {
      width: 100%; height: 380px; background: #fafafa;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem; color: var(--grey-mid); font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.05em;
      border: 1px solid #f5f5f5; overflow: hidden;
    }
    .catalog-card .card-meta {
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .catalog-card .card-name { font-size: 0.85rem; font-weight: 500; color: var(--black); text-transform: capitalize; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .catalog-card .card-sub { font-size: 0.7rem; color: var(--grey-mid); text-transform: uppercase; letter-spacing: 0.06em; }
    .catalog-card .card-price { font-size: 0.82rem; font-weight: 500; color: var(--grey-dark); margin-top: 0.1rem; }
    .catalog-card .btn {
      margin-top: 1rem; font-size: 0.7rem; padding: 0.65rem 1rem;
      letter-spacing: 0.1em; background: #000; color: #fff; border: 1px solid #000; width: 100%;
    }
    .active-filters-bar {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; min-height: 28px;
    }
    .active-filter-tag {
      background: var(--black); color: #fff; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 0.25rem 0.65rem; display: flex; align-items: center; gap: 0.4rem; cursor: pointer;
    }
    .active-filter-tag span { font-size: 0.9rem; line-height: 1; }
    @media (max-width: 900px) {
      .catalog-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  

  <main class="catalog-layout">

    <aside class="filter-sidebar">
      <h2 style="font-size:1.1rem;text-transform:uppercase;letter-spacing:0.1em;margin-top:0;margin-bottom:1.5rem;font-weight:500;">Filters</h2>

      <div class="filter-section" style="border-top:1px dashed var(--grey-light);">
        <button class="filter-header" onclick="toggleAccordion('content-size')">Size <span id="ind-size">&minus;</span></button>
        <div id="content-size" class="filter-content">
          <div class="size-grid">
            <div class="size-box" data-size="xs">XS</div>
            <div class="size-box" data-size="s">S</div>
            <div class="size-box" data-size="m">M</div>
            <div class="size-box" data-size="l">L</div>
            <div class="size-box" data-size="xl">XL</div>
            <div class="size-box" data-size="2xl">2XL</div>
          </div>
        </div>
      </div>

      <div class="filter-section">
        <button class="filter-header" onclick="toggleAccordion('content-cat')">Category <span id="ind-cat">&plus;</span></button>
        <div id="content-cat" class="filter-content" style="display:none;">
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="category" data-value="outerwear"> Outerwear</label>
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="category" data-value="tops"> Tops</label>
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="category" data-value="shirts"> Shirts</label>
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="category" data-value="bottoms"> Bottoms</label>
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="category" data-value="accessories"> Accessories</label>
        </div>
      </div>

      <div class="filter-section">
        <button class="filter-header" onclick="toggleAccordion('content-color')">Colors <span id="ind-color">&plus;</span></button>
        <div id="content-color" class="filter-content" style="display:none;">
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="color" data-value="white"> Off-White</label>
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="color" data-value="black"> Core Black</label>
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="color" data-value="charcoal"> Charcoal Pattern</label>
        </div>
      </div>

      <div class="filter-section">
        <button class="filter-header" onclick="toggleAccordion('content-price')">Price Range <span id="ind-price">&plus;</span></button>
        <div id="content-price" class="filter-content" style="display:none;">
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="price" data-value="0-150"> Under €150</label>
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="price" data-value="150-300"> €150 – €300</label>
          <label class="filter-label"><input type="checkbox" class="filter-check" data-filter="price" data-value="300-600"> €300 – €600</label>
        </div>
      </div>

      <div class="filter-section">
        <button class="filter-header" onclick="toggleAccordion('content-colls')">Collections <span id="ind-colls">&minus;</span></button>
        <div id="content-colls" class="filter-content">
          <button class="collection-btn-link active" id="coll-all" onclick="setCollection('all')">All Pieces</button>
          <button class="collection-btn-link" id="coll-summer" onclick="setCollection('summer')">Summer 2026</button>
          <button class="collection-btn-link" id="coll-essentials" onclick="setCollection('essentials')">Minimalist Essentials</button>
        </div>
      </div>

      
      <button class="btn" onclick="applyFilters()" style="width:100%;margin-top:1.5rem;padding:0.9rem;font-size:0.72rem;letter-spacing:0.14em;">Apply Filters</button>
    </aside>

    <section class="products-zone">
      <p style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--grey-mid);margin:0 0 0.5rem 0;">Home / Products</p>
      <h1 style="font-size:1.6rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:400;color:var(--black);margin:0 0 1.5rem 0;">Products</h1>

      
      <div style="position:relative;width:100%;max-width:400px;margin-bottom:1.5rem;">
        <input type="text" id="catalog-search" placeholder="Search within products…"
          style="width:100%;padding:0.8rem 1rem 0.8rem 2.5rem;border:none;background:#fafafa;font-family:var(--font);font-size:0.85rem;outline:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--grey-mid);">
          <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>

      
      <div id="active-filters-bar" class="active-filters-bar"></div>

      <div id="catalog-products-grid"></div>
    </section>
  </main>

  

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script>
    let allProducts = [];
    let activeCollection = 'all';
    let activeFilters = { size: [], category: [], color: [], price: [] };

    document.addEventListener('DOMContentLoaded', async () => {
      injectLayout('catalog');
      initLiveSearch();

      // Bug #15: show a loading skeleton while products are fetched.
      const gridEl = document.getElementById('catalog-products-grid');
      if (gridEl) {
        gridEl.innerHTML = Array.from({ length: 6 }).map(() => `
          <div class="catalog-card skeleton-card">
            <div class="card-image vir-skeleton skeleton-thumb"></div>
            <div class="vir-skeleton skeleton-line medium"></div>
            <div class="vir-skeleton skeleton-line short"></div>
          </div>`).join('');
      }

      allProducts = await apiGetAllProducts();

      
      const urlParams = new URLSearchParams(window.location.search);
      const searchParam = urlParams.get('search');
      if (searchParam) {
        document.getElementById('catalog-search').value = decodeURIComponent(searchParam);
      }

      renderGrid();
      window.refreshGridUI = renderGrid;

      
      document.querySelectorAll('.size-box').forEach(box => {
        box.addEventListener('click', () => {
          box.classList.toggle('active');
          const sz = box.dataset.size;
          const idx = activeFilters.size.indexOf(sz);
          idx > -1 ? activeFilters.size.splice(idx, 1) : activeFilters.size.push(sz);
        });
      });

      
      const catalogSearch = document.getElementById('catalog-search');
      if (catalogSearch) {
        catalogSearch.addEventListener('input', renderGrid);
      }
    });

    function toggleAccordion(id) {
      const el = document.getElementById(id);
      const key = id.replace('content-', '');
      const ind = document.getElementById('ind-' + key);
      const isHidden = el.style.display === 'none';
      el.style.display = isHidden ? 'flex' : 'none';
      if (ind) ind.innerHTML = isHidden ? '&minus;' : '&plus;';
    }

    function setCollection(name) {
      activeCollection = name;
      document.querySelectorAll('.collection-btn-link').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('coll-' + name);
      if (btn) btn.classList.add('active');
      renderGrid();
    }

    function applyFilters() {
      
      document.querySelectorAll('.filter-check').forEach(cb => {
        const filter = cb.dataset.filter;
        const value = cb.dataset.value;
        if (!activeFilters[filter]) activeFilters[filter] = [];
        const idx = activeFilters[filter].indexOf(value);
        if (cb.checked && idx === -1) activeFilters[filter].push(value);
        else if (!cb.checked && idx > -1) activeFilters[filter].splice(idx, 1);
      });
      renderGrid();
      updateActiveFilterBar();
    }

    function updateActiveFilterBar() {
      const bar = document.getElementById('active-filters-bar');
      let tags = '';
      Object.entries(activeFilters).forEach(([key, vals]) => {
        vals.forEach(v => {
          tags += `<div class="active-filter-tag" onclick="removeFilter('${key}','${v}')">
            ${key}: ${v} <span>&times;</span>
          </div>`;
        });
      });
      if (activeCollection !== 'all') {
        tags += `<div class="active-filter-tag" onclick="setCollection('all')">
          collection: ${activeCollection} <span>&times;</span>
        </div>`;
      }
      bar.innerHTML = tags;
    }

    function removeFilter(key, val) {
      const idx = activeFilters[key].indexOf(val);
      if (idx > -1) activeFilters[key].splice(idx, 1);
      // Uncheck the box
      const cb = document.querySelector(`.filter-check[data-filter="${key}"][data-value="${val}"]`);
      if (cb) cb.checked = false;
      renderGrid();
      updateActiveFilterBar();
    }

    function productMatchesFilters(p) {
      // Size: product.sizes is a comma list like "S,M,L,XL".
      if (activeFilters.size && activeFilters.size.length) {
        const psizes = (typeof p.sizes === 'string' ? p.sizes : '')
          .toLowerCase().split(',').map(function(s){ return s.trim(); });
        if (!activeFilters.size.some(function(s){ return psizes.indexOf(s) > -1; })) return false;
      }
      // Category: case-insensitive match against product.category.
      if (activeFilters.category && activeFilters.category.length) {
        const pcat = (p.category || '').toLowerCase();
        if (!activeFilters.category.some(function(c){ return pcat.indexOf(c) > -1; })) return false;
      }
      // Price: ranges like "100-200".
      if (activeFilters.price && activeFilters.price.length) {
        const val = window.parsePrice(p.price);
        const inRange = activeFilters.price.some(function(r){
          const parts = r.split('-').map(Number);
          return val >= parts[0] && val <= parts[1];
        });
        if (!inRange) return false;
      }
      // Color: the backend has no colour attribute, so colour cannot be
      // filtered. Selecting a colour is intentionally a no-op.
      return true;
    }

    function renderGrid() {
      const grid = document.getElementById('catalog-products-grid');
      if (!grid) return;

      const searchVal = (document.getElementById('catalog-search')?.value || '').toLowerCase().trim();

      let filtered = allProducts.filter(p => {
        if (activeCollection !== 'all' && p.collection !== activeCollection) return false;
        if (searchVal && !p.name.toLowerCase().includes(searchVal) && !(p.description || '').toLowerCase().includes(searchVal)) return false;
        if (!productMatchesFilters(p)) return false;
        return true;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--grey-mid);">No products match your filters.</p>`;
        return;
      }

      grid.innerHTML = filtered.map(function(item) {
        const isFav = window.favoritesList && window.favoritesList.map(Number).indexOf(Number(item.id)) > -1;
        return `
        <div class="catalog-card">
          <a href="product.html?id=${item.id}">
            <div class="card-image">
              ${item.image_url ? `<img src="${escapeHTML(item.image_url)}" alt="${escapeHTML(item.name)}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'">` : `<span style="opacity:0.5;">Product Frame</span>`}
            </div>
          </a>
          <div class="card-meta">
            <div style="display:flex;flex-direction:column;gap:0.2rem;">
              <span class="card-sub">${escapeHTML(item.category || 'Apparel')}</span>
              <h3 class="card-name">${escapeHTML(item.name)}</h3>
            </div>
            <span class="card-price">${window.formatPrice(item.price)}</span>
          </div>
          <div class="product-card-controls">
            <button class="btn" onclick="window.addToCart(${item.id})">Add to Bag</button>
            <button class="btn-fav ${isFav ? 'active' : ''}" data-id="${item.id}"
              onclick="window.toggleFavorite(${item.id})" aria-label="Favorite">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </button>
          </div>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
