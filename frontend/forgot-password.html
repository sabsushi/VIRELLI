<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="VIRELLI — Reset your password.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
  <title>Reset Password — VIRELLI</title>
  <style>
    .auth-container {
      max-width: 460px;
      margin: var(--spacing-xl) auto 6rem auto;
      padding: var(--spacing-lg);
      border: 1px solid var(--grey-light);
      background: #ffffff;
    }
    .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
    .auth-form input {
      width: 100%; padding: 0.9rem 1rem;
      border: 1px solid var(--grey-light); background: #fafafa;
      font-family: var(--font); font-size: 0.85rem;
      outline: none; box-sizing: border-box; transition: border-color 0.2s;
    }
    .auth-form input:focus { border-color: var(--grey-mid); background: #fff; }
    .auth-form .btn { width: 100%; padding: 1rem; font-size: 0.8rem; }
    .auth-divider {
      text-align: center; font-size: 0.75rem; color: var(--grey-mid);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    #sent-state {
      display: none; text-align: center; padding: 0.5rem 0;
      flex-direction: column; align-items: center; gap: 1rem;
    }
    #sent-state h3 {
      font-size: 1rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.08em; margin: 0;
    }
    #sent-state p { font-size: 0.82rem; color: var(--grey-mid); line-height: 1.6; margin: 0; }
  </style>
</head>
<body>

 

  <main>
    <div class="auth-container">

      <a href="auth.html" style="font-size:0.8rem;color:var(--grey-mid);text-decoration:none;display:block;margin-bottom:1.5rem;">← Back to Sign In</a>

      <h2 style="font-size:1rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:500;margin:0 0 0.4rem;">Reset Password</h2>
      <p style="font-size:0.82rem;color:var(--grey-mid);line-height:1.6;margin:0 0 1.75rem;">
        Enter your account email and we'll send you password reset instructions.
      </p>

      <div id="auth-error" class="auth-message auth-error"></div>

      
      <div id="reset-form-wrap">
        <form id="form-forgot" class="auth-form">
          <input type="email" id="forgot-email" placeholder="Email Address" required autocomplete="email">
          <button type="submit" class="btn">Send Reset Email</button>
          <div class="auth-divider">or</div>
          <a href="auth.html" class="btn" style="background:#fff;color:var(--black);border:1px solid var(--grey-light);text-decoration:none;text-align:center;padding:1rem;font-family:var(--font);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;display:block;box-sizing:border-box;">Back to Sign In</a>
        </form>
      </div>

      
      <div id="sent-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <h3>Check your inbox</h3>
        <p id="sent-message"></p>
        <a href="auth.html" class="btn" style="text-decoration:none;text-align:center;padding:1rem;font-family:var(--font);font-size:0.8rem;display:block;box-sizing:border-box;">Back to Sign In</a>
      </div>

    </div>
  </main>

  

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      injectLayout();
      initLiveSearch();
    });

    document.getElementById('form-forgot').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('forgot-email').value.trim();
      var errEl = document.getElementById('auth-error');
      errEl.style.display = 'none';

      var users = JSON.parse(localStorage.getItem('VIRELLI_USER_DB')) || [];
      var user  = users.find(function(u) { return u.email === email; });
      var isAdmin = (email === 'admin@virelli.com');

      if (user || isAdmin) {
        document.getElementById('reset-form-wrap').style.display = 'none';
        var sentEl  = document.getElementById('sent-state');
        var sentMsg = document.getElementById('sent-message');
        // Bug #9: never reveal a stored password (this previously exposed the
        // admin password in plaintext). Show a neutral confirmation instead.
        sentMsg.textContent = 'If an account exists for ' + email + ', reset instructions have been sent.';
        sentEl.style.display = 'flex';
      } else {
        errEl.textContent = 'No account found with that email address.';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
