<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="VIRELLI — Product detail.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
  <title>Product — VIRELLI</title>
  <style>
    .product-detail {
      width: 100%;
      margin: 0 0 6rem 0;
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      align-items: start;
    }

    .product-detail-image {
      position: sticky;
      top: var(--nav-height);
      height: calc(100vh - var(--nav-height));
      max-height: 750px;
      background: #eeede9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .product-detail-image img,
    .product-detail-image .image-placeholder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #eeede9;
    }

    .product-info {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 5rem 5rem 5rem 6rem;
      max-width: 560px;
    }
    .product-info-category {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--grey-mid);
      margin-bottom: 1rem;
    }
    .product-info h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: 0.02em;
      margin-bottom: 1.25rem;
    }
    .product-info .price {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--grey-dark);
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--grey-light);
    }
    .product-info .description {
      font-size: 0.85rem;
      color: var(--grey-mid);
      line-height: 1.9;
      margin-bottom: 2.5rem;
    }

    .size-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--grey-mid);
      margin-bottom: 0.65rem;
      display: block;
    }
    .size-options {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .size-btn {
      width: 48px;
      height: 48px;
      border: 1px solid var(--grey-light);
      background: #fff;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      font-family: var(--font);
      color: var(--grey-dark);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .size-btn:hover { border-color: var(--grey-dark); color: var(--black); }
    .size-btn.selected { background: var(--black); border-color: var(--black); color: #fff; }

    .product-detail-actions { display: flex; gap: 0.6rem; margin-bottom: 2rem; }
    .btn-add-bag {
      flex: 1;
      padding: 1.1rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--black);
      color: #fff;
      border: 1px solid var(--black);
      cursor: pointer;
      font-family: var(--font);
      position: relative;
      overflow: hidden;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    .btn-add-bag:hover:not(.added) { background: transparent; color: var(--black); }
    .btn-add-bag.added { background: #2a7a4b; border-color: #2a7a4b; color: #fff; }
    .btn-add-bag .btn-label { transition: opacity 0.15s ease, transform 0.15s ease; display: block; }
    .btn-add-bag .btn-check {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s ease 0.1s, transform 0.2s ease 0.1s;
      font-size: 0.75rem; letter-spacing: 0.12em;
    }
    .btn-add-bag.added .btn-label { opacity: 0; transform: translateY(-8px); }
    .btn-add-bag.added .btn-check { opacity: 1; transform: translateY(0); }

    #cart-reminder {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--black);
      color: #fff;
      padding: 1rem var(--spacing-lg);
      z-index: 200;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    #cart-reminder.visible { display: flex; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    #cart-reminder a.btn-reminder {
      padding: 0.6rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 0.7rem; letter-spacing: 0.12em;
      text-transform: uppercase; text-decoration: none;
      transition: background 0.2s ease;
    }
    #cart-reminder a.btn-reminder:hover { background: rgba(255,255,255,0.12); }

    .product-meta-row {
      display: flex; flex-direction: column; gap: 0.75rem;
      padding-top: 2rem; border-top: 1px solid var(--grey-light);
      font-size: 0.78rem; color: var(--grey-mid);
    }
    .product-meta-row span { display: flex; align-items: center; gap: 0.5rem; }

    /* Responsive */
    @media (max-width: 900px) {
      .product-detail {
        grid-template-columns: 1fr;
      }
      .product-detail-image {
        position: relative;
        top: auto;
        height: 70vw;
        min-height: 280px;
        max-height: 520px;
      }
      .product-info {
        padding: 2rem var(--spacing-lg);
        max-width: 100%;
      }
    }

    @media (max-width: 480px) {
      .product-detail-image { height: 85vw; min-height: 240px; }
      .product-info { padding: 1.25rem; }
      .product-info h1 { font-size: 1.5rem; }
      .product-detail-actions { flex-direction: column; }
      .btn-add-bag { width: 100%; min-height: 52px; }
      .size-btn { width: 52px; height: 52px; font-size: 0.78rem; }
      #cart-reminder { flex-direction: column; gap: 0.75rem; text-align: center; padding: 1.25rem; padding-bottom: calc(1.25rem + env(safe-area-inset-bottom)); }
      #cart-reminder a.btn-reminder { width: 100%; text-align: center; display: block; padding: 0.85rem; }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <div id="product-detail" class="product-detail">
      <p style="color:var(--grey-mid);font-size:0.85rem;grid-column:1/-1;padding:3rem;">Loading product…</p>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <div id="cart-reminder">
    <span>You have items in your bag</span>
    <a href="checkout.html" class="btn-reminder">View Bag</a>
  </div>

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/render.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectLayout();
    });
  </script>
</body>
</html>
