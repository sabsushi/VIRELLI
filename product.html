<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="VIRELLI — Product detail.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
  <title>Product — VIRELLI</title>
  <style>
    .product-detail {
      max-width: 1100px;
      margin: 3rem auto 5rem auto;
      padding: 0 var(--spacing-lg);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    .product-info { display: flex; flex-direction: column; gap: 1.25rem; }
    .product-info h1 {
      font-family: var(--font-serif);
      font-size: 2rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .product-info .price { font-size: 1.3rem; font-weight: 500; color: var(--black); }
    .product-info .description { font-size: 0.88rem; color: var(--grey-dark); line-height: 1.8; }
    .product-detail-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .product-detail-actions .btn { flex: 1; padding: 1rem; font-size: 0.8rem; }
    @media (max-width: 768px) {
      .product-detail { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Nav injected by components.js -->

  <main>
    <div id="product-detail" class="product-detail">
      <p style="color:var(--grey-mid);font-size:0.85rem;grid-column:1/-1;">Loading product…</p>
    </div>
  </main>

  <!-- Footer injected by components.js -->

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/render.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectLayout();
      initLiveSearch();
    });
  </script>
</body>
</html>
